<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAPTER TWO - Webデザイナー養成</title>
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        }

        html {
            font-size: 16px;
            @media (max-width: 768px) {
                font-size: 14px;
            }
            @media (max-width: 480px) {
                font-size: 12px;
            }
        }

        body {
            line-height: 1.5;
            color: #333;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        /* 顶部导航栏 - 精准还原视觉 */
        .header {
            background-color: #333333; /* 匹配原图深色背景 */
            color: #ffffff;
            padding: 0 2vw;
            border-bottom: 3px solid #0099ff; /* 顶部蓝色分割线 */
        }

        .nav-container {
            max-width: 1920px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px; /* 匹配原图导航高度 */
        }

        .logo {
            height: 60px; /* Logo高度适配 */
            width: auto;
        }

        /* 导航菜单 - 居中排列 */
        .nav-center {
            display: flex;
            gap: 3vw; /* 导航项间距 */
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .nav-center li a {
            padding: 0.5rem;
            transition: color 0.3s;
            position: relative;
        }

        .nav-center li a:hover {
            color: #0099ff;
        }

        /* 咨询按钮 - 精准还原红色样式 */
        .consult-btn {
            background-color: #e84a4a; /* 匹配原图红色 */
            color: #ffffff;
            padding: 0.8rem 2rem;
            border-radius: 0; /* 直角按钮 */
            font-size: 1.1rem;
            white-space: nowrap;
            transition: background-color 0.3s;
        }

        .consult-btn:hover {
            background-color: #d03e3e;
        }

        /* 汉堡菜单（移动端） */
        .hamburger {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 1000;
        }

        /* Banner轮播容器 - 预留轮播逻辑 */
        .banner-slider {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        /* 单张Banner样式 - 精准还原视觉 */
        .banner {
            position: relative;
            width: 100%;
            height: calc(100vh - 80px);
            min-height: 500px;
            max-height: 800px;
            background: url("https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/6567a08eaae2444192b8548da8447393.png~tplv-a9rns2rl98-24:720:720.png") center/cover no-repeat;
            color: #333;
        }

        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .banner-content {
            text-align: center;
            max-width: 900px;
            padding: 0 5vw;
        }

        /* 顶部红色标签 - 匹配原图样式 */
        .banner-top-tag {
            background-color: #e84a4a;
            color: #ffffff;
            font-size: 1.2rem;
            padding: 0.6rem 2rem;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .banner-top-tag::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #e84a4a;
        }

        /* Banner标题样式 - 精准匹配字体大小/颜色 */
        .banner-subtitle {
            font-size: clamp(1.5rem, 3vw, 2rem);
            color: #333;
            margin-bottom: 1rem;
        }

        .banner-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: #e84a4a;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            font-weight: bold;
        }

        .banner-title span {
            font-size: clamp(1.8rem, 4vw, 3rem);
            display: block;
        }

        /* Banner底部按钮 - 匹配原图样式 */
        .banner-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .banner-btn {
            background-color: #f5f5f5;
            color: #333;
            padding: 0.8rem 1.8rem;
            border-radius: 0;
            font-size: 1.1rem;
            border: 2px solid #333;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 3px 3px 0 #333;
        }

        .banner-btn:hover {
            background-color: #e84a4a;
            color: #fff;
            border-color: #e84a4a;
            box-shadow: 3px 3px 0 #b93838;
        }

        /* 轮播控制按钮 - 预留样式 */
        .slider-controls {
            position: absolute;
            top: 50%;
            left: 2vw;
            right: 2vw;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
            z-index: 10;
        }

        .slider-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.8);
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }

        .slider-btn:hover {
            background-color: #e84a4a;
            color: #fff;
        }

        /* 响应式媒体查询 */
        @media (max-width: 768px) {
            .nav-center {
                display: none;
                position: absolute;
                top: 80px;
                left: 0;
                width: 100%;
                background-color: #333;
                flex-direction: column;
                padding: 2rem 0;
                gap: 1.5rem;
                text-align: center;
                z-index: 999;
            }

            .nav-center.active {
                display: flex;
            }

            .hamburger {
                display: block;
            }

            .consult-btn {
                margin-left: auto;
                margin-right: 1rem;
                padding: 0.6rem 1.5rem;
                font-size: 1rem;
            }

            .banner {
                height: auto;
                padding: 5rem 0;
            }

            .slider-controls {
                display: none; /* 移动端隐藏轮播按钮 */
            }
        }

        @media (max-width: 480px) {
            .banner-buttons {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }

            .banner-btn {
                width: 90%;
                box-shadow: 2px 2px 0 #333;
            }

            .banner-top-tag {
                font-size: 1rem;
                padding: 0.4rem 1.5rem;
            }
        }
    </style>
</head>

    <!-- Banner轮播容器（预留轮播逻辑） -->
    <section class="banner-slider">
        <!-- 轮播控制按钮（预留） -->
        <div class="slider-controls">
            <button class="slider-btn prev-btn">◀</button>
            <button class="slider-btn next-btn">▶</button>

        <!-- 第一张Banner（替换为你的轮播图） -->

                    <h1 class="banner-title">即戦力の<span>Webデザイナーに</span></h1>

    <script>
        // 移动端汉堡菜单交互
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');

        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            hamburger.textContent = navMenu.classList.contains('active') ? '✕' : '☰';
        });

        // 点击导航链接关闭菜单
        const navLinks = document.querySelectorAll('.nav-center li a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    navMenu.classList.remove('active');
                    hamburger.textContent = '☰';
                }
            });
        });

        // 窗口大小变化重置菜单
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                navMenu.classList.remove('active');
                hamburger.textContent = '☰';
            }
        });

        // 轮播图基础逻辑（预留，替换轮播图地址即可使用）
        const sliderBtns = document.querySelectorAll('.slider-btn');
        // 这里可以扩展轮播逻辑，比如切换banner背景图、内容等
        sliderBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 轮播切换逻辑（示例：仅打印提示）
                console.log(btn.classList.contains('prev-btn') ? '上一张' : '下一张');
                // 实际使用时替换为：切换banner的background-image或innerHTML
            });
        });
    </script>
